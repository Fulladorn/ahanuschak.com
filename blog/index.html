<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Aaron Hanuschak</title>
    <meta name="description" content="Writing on enterprise AI, architecture, and building systems that scale.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           DESIGN SYSTEM — Custom Properties
           ============================================ */
        :root {
            --bg: #050a0f;
            --bg-card: rgba(10, 20, 35, 0.7);
            --cyan: #00b4d8;
            --cyan-dim: #0096c7;
            --text: #e0f0ff;
            --text-muted: #7fa7c0;
            --border: rgba(255, 255, 255, 0.1);
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: 'DM Sans', sans-serif;
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 2rem;
            --space-lg: 4rem;
            --space-xl: 6rem;
            --max-width: 1200px;
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--cyan); text-decoration: none; }

        ::selection { background: var(--cyan); color: var(--bg); }

        /* ============================================
           BACKGROUND GRID TEXTURE
           ============================================ */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 180, 216, 0.03) 0px,
                    rgba(0, 180, 216, 0.03) 1px,
                    transparent 1px,
                    transparent 40px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(0, 180, 216, 0.03) 0px,
                    rgba(0, 180, 216, 0.03) 1px,
                    transparent 1px,
                    transparent 40px
                );
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 40px;
            width: 1px; height: 100%;
            background: rgba(0, 180, 216, 0.06);
            pointer-events: none;
            z-index: 0;
            box-shadow: calc(100vw - 80px) 0 0 0 rgba(0, 180, 216, 0.06);
        }

        /* ============================================
           SCROLL PROGRESS BAR
           ============================================ */
        .scroll-progress {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 8px rgba(0, 180, 216, 0.5);
            z-index: 1001;
            width: 0;
            transition: none;
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 1rem 2rem;
            transition: background 0.3s, border-color 0.3s, backdrop-filter 0.3s;
            border-top: 2px solid transparent;
        }

        .nav.scrolled {
            background: rgba(5, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top-color: var(--cyan);
        }

        .nav-logo {
            font-family: var(--font-mono);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 2px;
            display: none;
        }

        .nav-logo span { color: var(--cyan); }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.3s;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 1px;
            background: var(--cyan);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--cyan);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            transform: scaleX(1);
        }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
        }

        .nav-toggle span {
            display: block;
            width: 24px; height: 2px;
            background: var(--text);
            transition: transform 0.3s, opacity 0.3s;
        }

        @media (max-width: 768px) {
            .nav { justify-content: space-between; }
            .nav-toggle { display: flex; z-index: 1001; }
            .nav-logo { display: block; }
            .nav-links {
                position: fixed;
                top: 0; left: 0;
                width: 100vw; height: 100vh;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: rgba(5, 10, 15, 0.75);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                padding: 2rem;
                gap: 1.5rem;
                transform: translateY(-100%);
                transition: transform 0.3s;
            }
            .nav-links.open { transform: translateY(0); }
            .nav-links a { font-size: 0.9rem; }
        }

        /* ============================================
           SECTION UTILITIES
           ============================================ */
        .section-label {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--cyan-dim);
            letter-spacing: 2px;
            margin-bottom: var(--space-sm);
            opacity: 0.8;
        }

        .section-label::before {
            content: '$ ';
            color: var(--cyan);
            opacity: 0.5;
        }

        .section-title {
            font-family: var(--font-mono);
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            margin-bottom: var(--space-md);
        }

        /* ============================================
           GLASSMORPHISM CARD
           ============================================ */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .glass-card:hover {
            border-color: rgba(0, 180, 216, 0.4);
            box-shadow: 0 0 30px rgba(0, 180, 216, 0.1);
            background: rgba(10, 25, 45, 0.8);
        }

        /* ============================================
           BUTTON
           ============================================ */
        .btn {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            padding: 0.75rem 1.75rem;
            border: 1px solid var(--cyan);
            background: transparent;
            color: var(--cyan);
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s, box-shadow 0.3s;
            display: inline-block;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--cyan);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.3);
        }

        /* ============================================
           SCROLL ANIMATIONS
           ============================================ */
        .animate-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .animate-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stagger-1 { transition-delay: 0.1s; }
        .stagger-2 { transition-delay: 0.2s; }
        .stagger-3 { transition-delay: 0.3s; }
        .stagger-4 { transition-delay: 0.4s; }
        .stagger-5 { transition-delay: 0.5s; }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            text-align: center;
            padding: var(--space-md);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.5;
            letter-spacing: 1px;
        }

        /* ============================================
           FOCUS STYLES
           ============================================ */
        a:focus-visible, button:focus-visible, .btn:focus-visible {
            outline: 2px solid var(--cyan);
            outline-offset: 3px;
        }

        /* ============================================
           REDUCED MOTION
           ============================================ */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            html { scroll-behavior: auto; }
            .animate-in { opacity: 1; transform: none; }
        }

        /* ============================================
           BLOG PAGE LAYOUT
           ============================================ */
        .blog-page {
            padding-top: 80px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .blog-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: var(--space-xl) var(--space-md);
        }

        /* ============================================
           LISTING VIEW — Post Cards Grid
           ============================================ */
        #listing-view { display: block; }
        #post-view { display: none; }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-md);
            margin-top: var(--space-md);
        }

        @media (max-width: 1024px) {
            .posts-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .posts-grid { grid-template-columns: 1fr; }
        }

        .post-card {
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            cursor: pointer;
        }

        .post-card-date {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--cyan-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .post-card-title {
            font-family: var(--font-mono);
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            margin-top: var(--space-xs);
        }

        .post-card-excerpt {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            flex: 1;
            margin-top: var(--space-xs);
        }

        .post-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: var(--space-xs);
        }

        .tag {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--cyan);
            border: 1px solid rgba(0, 180, 216, 0.3);
            padding: 2px 8px;
            border-radius: 3px;
        }

        .post-card-link {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: var(--space-sm);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: gap 0.3s;
        }

        .post-card:hover .post-card-link {
            gap: 0.7rem;
        }

        /* ============================================
           SKELETON LOADING STATES
           ============================================ */
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .skeleton-card {
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 3px;
            background: rgba(0, 180, 216, 0.15);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }

        .skeleton-line.short { width: 40%; }
        .skeleton-line.medium { width: 70%; }
        .skeleton-line.full { width: 100%; }
        .skeleton-line.title { height: 20px; width: 85%; }

        .skeleton-line:nth-child(2) { animation-delay: 0.1s; }
        .skeleton-line:nth-child(3) { animation-delay: 0.2s; }
        .skeleton-line:nth-child(4) { animation-delay: 0.3s; }
        .skeleton-line:nth-child(5) { animation-delay: 0.4s; }

        @media (prefers-reduced-motion: reduce) {
            .skeleton-line { animation: none; opacity: 0.5; }
        }

        /* ============================================
           ERROR STATE
           ============================================ */
        .error-state {
            background: var(--bg-card);
            border: 1px solid rgba(255, 95, 86, 0.3);
            border-radius: 12px;
            padding: var(--space-md);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: #ff5f56;
            line-height: 1.6;
            max-width: 600px;
        }

        .error-state::before {
            content: '$ ERROR\A';
            white-space: pre;
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        /* ============================================
           EMPTY STATE
           ============================================ */
        .empty-state {
            text-align: center;
            padding: var(--space-xl) var(--space-md);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            grid-column: 1 / -1;
        }

        /* ============================================
           SINGLE POST VIEW
           ============================================ */
        .post-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: var(--space-md);
            transition: color 0.3s;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .post-back:hover { color: var(--cyan); }

        .post-header {
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border);
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            flex-wrap: wrap;
            margin-bottom: var(--space-sm);
        }

        .post-date {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--cyan-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .post-title {
            font-family: var(--font-mono);
            font-size: clamp(1.6rem, 4vw, 2.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-top: var(--space-sm);
        }

        /* ============================================
           POST BODY — Portable Text Rendered HTML
           ============================================ */
        .post-body {
            max-width: 720px;
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text);
        }

        .post-body p {
            margin-bottom: var(--space-sm);
        }

        .post-body h2 {
            font-family: var(--font-mono);
            font-size: clamp(1.2rem, 2.5vw, 1.5rem);
            font-weight: 700;
            color: var(--text);
            margin: var(--space-md) 0 var(--space-xs);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .post-body h3 {
            font-family: var(--font-mono);
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 700;
            color: var(--text);
            margin: var(--space-sm) 0 var(--space-xs);
        }

        .post-body strong { color: var(--text); font-weight: 700; }

        .post-body em { font-style: italic; color: var(--text-muted); }

        .post-body code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: rgba(0, 180, 216, 0.1);
            color: var(--cyan);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid rgba(0, 180, 216, 0.2);
        }

        .post-body pre {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: var(--space-sm);
            overflow-x: auto;
            margin: var(--space-sm) 0;
        }

        .post-body pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.85rem;
            color: var(--text);
        }

        .post-body ul, .post-body ol {
            padding-left: var(--space-md);
            margin-bottom: var(--space-sm);
        }

        .post-body li {
            margin-bottom: 0.3rem;
        }

        .post-body ul li::marker { color: var(--cyan); }
        .post-body ol li::marker { color: var(--cyan); font-family: var(--font-mono); }

        .post-body a {
            color: var(--cyan);
            text-decoration: underline;
            text-decoration-color: rgba(0, 180, 216, 0.4);
            text-underline-offset: 3px;
            transition: text-decoration-color 0.3s;
        }

        .post-body a:hover {
            text-decoration-color: var(--cyan);
        }

        .post-body blockquote {
            border-left: 2px solid var(--cyan);
            padding-left: var(--space-sm);
            margin: var(--space-sm) 0;
            color: var(--text-muted);
            font-style: italic;
        }

        .post-body .table-wrap {
            overflow-x: auto;
            margin: var(--space-sm) 0;
        }

        .post-body table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }

        .post-body th, .post-body td {
            padding: 0.6rem 1rem;
            text-align: left;
            border: 1px solid var(--border);
        }

        .post-body th {
            background: rgba(0, 180, 216, 0.08);
            color: var(--cyan);
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.72rem;
        }

        .post-body tr:nth-child(even) td {
            background: rgba(10, 20, 35, 0.4);
        }

        .post-body tr:last-child td {
            color: var(--text);
            font-weight: 700;
            border-top: 1px solid rgba(0, 180, 216, 0.3);
        }

        /* ============================================
           RAG vs CACHE-AUG ANALYZER WIDGET
           ============================================ */
        .rca-widget {
            width: 100%;
            max-width: 900px;
            margin: var(--space-md) 0;
            padding: var(--space-md);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .rca-header { margin-bottom: var(--space-sm); }
        .rca-title {
            font-family: var(--font-mono);
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            font-weight: 700;
            color: var(--text);
            margin-top: 0.4rem;
        }
        .rca-section {
            margin-top: var(--space-sm);
            padding-top: var(--space-sm);
            border-top: 1px solid var(--border);
        }
        .rca-section-title {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--cyan-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
        }
        .rca-row { display: flex; flex-wrap: wrap; gap: var(--space-sm); }
        .rca-row-wrap { flex-wrap: wrap; }
        .rca-field { display: flex; flex-direction: column; gap: 0.3rem; min-width: 160px; flex: 1; }
        .rca-field-slider { min-width: 100%; }
        .rca-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rca-slider-val { color: var(--cyan); font-weight: 700; }
        .rca-select, .rca-input {
            background: rgba(10, 20, 35, 0.6);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            padding: 0.45rem 0.6rem;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        .rca-select:focus, .rca-input:focus { border-color: rgba(0, 180, 216, 0.5); }
        .rca-select option { background: #0a1623; }
        .rca-input[type="number"] { max-width: 120px; }
        .rca-range {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 20px;
            background: transparent;
            outline: none;
            cursor: pointer;
        }
        .rca-range::-webkit-slider-runnable-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }
        .rca-range::-moz-range-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            border: none;
        }
        .rca-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 6px rgba(0, 180, 216, 0.5);
            cursor: pointer;
            margin-top: -5px;
        }
        .rca-range::-moz-range-thumb {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--cyan);
            border: none;
            cursor: pointer;
        }
        .rca-toggle {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            align-self: flex-start;
        }
        .rca-toggle-on {
            border-color: rgba(0, 180, 216, 0.5);
            color: var(--cyan);
            background: rgba(0, 180, 216, 0.08);
        }
        .rca-derived {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: var(--space-sm);
            padding: 0.75rem;
            background: rgba(0, 180, 216, 0.04);
            border: 1px solid rgba(0, 180, 216, 0.12);
            border-radius: 8px;
        }
        .rca-pill {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
            padding: 0.4rem 0.7rem;
            background: rgba(0, 180, 216, 0.06);
            border: 1px solid rgba(0, 180, 216, 0.15);
            border-radius: 6px;
            min-width: 120px;

            font-size: 0.62rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .rca-pill-value {
            font-family: var(--font-mono);
            font-size: 0.85rem;

        .rca-alerts { margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .rca-alert {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 0.5rem 0.75rem;
            background: rgba(255, 180, 0, 0.06);
            border: 1px solid rgba(255, 180, 0, 0.3);
            border-radius: 6px;

        .rca-alert-info {
            background: rgba(0, 180, 216, 0.05);
            border-color: rgba(0, 180, 216, 0.2);
            color: var(--text-muted);
        }
        .rca-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
            margin-top: var(--space-sm);
        }
        .rca-card {
            padding: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .rca-card-green {
            border-color: rgba(0, 200, 100, 0.3);
            background: rgba(0, 200, 100, 0.05);
        }
        .rca-card-blue {
            border-color: rgba(0, 180, 216, 0.3);
            background: rgba(0, 180, 216, 0.05);
        }
        .rca-card-title {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .rca-card-value {
            font-family: var(--font-mono);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
        }
        .rca-card-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        .rca-banner {
            margin-top: var(--space-sm);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            line-height: 1.5;
        }
        .rca-banner-green {
            background: rgba(0, 200, 100, 0.07);
            border: 1px solid rgba(0, 200, 100, 0.3);
            color: rgba(0, 230, 120, 0.9);
        }
        .rca-banner-blue {
            background: rgba(0, 180, 216, 0.07);
            border: 1px solid rgba(0, 180, 216, 0.3);
            color: var(--cyan);
        }
        .rca-tabs {
            display: flex;
            gap: 0;
            margin-top: var(--space-sm);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .rca-tab-btn {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.2s, border-color 0.2s;
            margin-bottom: -1px;
        }
        .rca-tab-btn:hover { color: var(--text); }
        .rca-tab-active { border-bottom-color: var(--cyan) !important; color: var(--cyan) !important; }
        .rca-panel { display: none; padding-top: var(--space-sm); }
        .rca-panel-active { display: block; }
        .rca-breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
        }
        .rca-bd-col {}
        .rca-bd-head {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--cyan-dim);
            margin-bottom: 0.5rem;
        }
        .rca-bd-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
        }
        .rca-bd-table td {
            padding: 0.3rem 0.4rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            vertical-align: top;
        }
        .rca-bd-table tfoot td {
            border-top: 1px solid rgba(0, 180, 216, 0.2);
            border-bottom: none;
            color: var(--text);
            padding-top: 0.5rem;
        }
        .rca-bd-val { text-align: right; font-family: var(--font-mono); white-space: nowrap; }
        .rca-chart-wrap { height: 280px; position: relative; }
        .rca-assumptions {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.7;
            padding-left: 1.2rem;
        }
        .rca-assumptions li { margin-bottom: 0.4rem; }
        .rca-assumptions strong { color: var(--text); }
        @media (max-width: 640px) {
            .rca-summary { grid-template-columns: 1fr; }
            .rca-breakdown { grid-template-columns: 1fr; }
            .rca-widget { padding: var(--space-sm); }
        }
        @media (prefers-reduced-motion: reduce) {
            .rca-toggle, .rca-tab-btn, .rca-select, .rca-input { transition: none; }
        }
    </style>
</head>
<body>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" aria-hidden="true"></div>

    <!-- Navigation -->
    <nav class="nav" role="navigation" aria-label="Main navigation">
        <div class="nav-logo"><span>Aaron</span> Hanuschak</div>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="/#about">About</a></li>
            <li><a href="/#experience">Experience</a></li>
            <li><a href="/#projects">Projects</a></li>
            <li><a href="/blog" class="active">Blog</a></li>
            <li><a href="/#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Blog Page -->
    <main class="blog-page">
        <div class="blog-container">

            <!-- Listing View -->
            <div id="listing-view">
                <div class="section-label animate-in">&lt; WRITING /&gt;</div>
                <h1 class="section-title animate-in">Blog</h1>
                <div class="posts-grid" id="posts-grid">
                    <!-- Skeleton placeholders shown while loading -->
                    <div class="glass-card skeleton-card">
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line full"></div>
                        <div class="skeleton-line medium"></div>
                    </div>
                    <div class="glass-card skeleton-card">
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line full"></div>
                        <div class="skeleton-line medium"></div>
                    </div>
                    <div class="glass-card skeleton-card">
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line title"></div>
                        <div class="skeleton-line full"></div>
                        <div class="skeleton-line medium"></div>
                    </div>
                </div>
            </div>

            <!-- Single Post View -->
            <div id="post-view">
                <button class="post-back" id="post-back-btn" aria-label="Back to blog">
                    &#8592; All Posts
                </button>
                <article>
                    <header class="post-header">
                        <div class="post-meta">
                            <span class="post-date" id="post-date"></span>
                            <div class="post-card-tags" id="post-tags"></div>
                        </div>
                        <h1 class="post-title" id="post-title"></h1>
                    </header>
                    <div class="post-body" id="post-body"></div>
                </article>
            </div>

        </div>
    </main>

    <footer class="footer">
        &copy; 2026 Aaron Hanuschak
    </footer>

    <script>
    // ============================================
    // SANITY CONFIG — fill in after Phase 1
    // ============================================
    const SANITY_PROJECT_ID = 'b1h0xtib';
    const SANITY_DATASET    = 'production';
    const SANITY_API_VER    = '2024-01-01';

    // ============================================
    // SANITY FETCH HELPER
    // ============================================
    function sanityFetch(query, params) {
        var encoded = encodeURIComponent(query);
        var url = 'https://' + SANITY_PROJECT_ID + '.api.sanity.io/v' + SANITY_API_VER +
            '/data/query/' + SANITY_DATASET + '?query=' + encoded;
        if (params) {
            Object.keys(params).forEach(function(k) {
                url += '&$' + k + '=' + encodeURIComponent(JSON.stringify(params[k]));
            });
        }
        return fetch(url).then(function(res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        }).then(function(data) {
            return data.result;
        });
    }

    // ============================================
    // PORTABLE TEXT RENDERER
    // ============================================
    function renderPortableText(blocks) {
        if (!blocks || !blocks.length) return '';
        var html = '';
        var i = 0;
        while (i < blocks.length) {
            var block = blocks[i];
            if (block._type === 'block') {
                var style = block.style || 'normal';
                var inner = renderSpans(block.children || []);

                if (block.listItem) {
                    // Collect consecutive list items of the same type
                    var listType = block.listItem === 'bullet' ? 'ul' : 'ol';
                    var items = '';
                    while (i < blocks.length && blocks[i].listItem === block.listItem) {
                        items += '<li>' + renderSpans(blocks[i].children || []) + '</li>';
                        i++;
                    }
                    html += '<' + listType + '>' + items + '</' + listType + '>';
                    continue;
                }

                if (style === 'h2') {
                    html += '<h2>' + inner + '</h2>';
                } else if (style === 'h3') {
                    html += '<h3>' + inner + '</h3>';
                } else if (style === 'blockquote') {
                    html += '<blockquote>' + inner + '</blockquote>';
                } else {
                    // normal paragraph — skip empty ones
                    if (inner.trim()) {
                        html += '<p>' + inner + '</p>';
                    }
                }
            } else if (block._type === 'code') {
                var lang = block.language ? ' data-lang="' + esc(block.language) + '"' : '';
                html += '<pre' + lang + '><code>' + esc(block.code || '') + '</code></pre>';
            } else if (block._type === 'ragCacheAnalyzer') {
                var wh = block.heading ? esc(block.heading) : 'Interactive Cost Analyzer';
                html += '<div class="rag-cache-widget-placeholder" data-heading="' + wh + '" data-key="' + esc(block._key || '') + '"></div>';
            }
            i++;
        }
        return html;
    }

    function renderSpans(children) {
        return children.map(function(span) {
            if (span._type !== 'span') return '';
            var text = esc(span.text || '');
            var marks = span.marks || [];
            marks.forEach(function(mark) {
                if (mark === 'strong') { text = '<strong>' + text + '</strong>'; }
                else if (mark === 'em') { text = '<em>' + text + '</em>'; }
                else if (mark === 'code') { text = '<code>' + text + '</code>'; }
                else if (mark === 'underline') { text = '<u>' + text + '</u>'; }
                // link marks are objects — handled separately below
            });
            return text;
        }).join('');
    }

    function renderSpansWithMarkDefs(children, markDefs) {
        markDefs = markDefs || [];
        var defsMap = {};
        markDefs.forEach(function(def) { defsMap[def._key] = def; });
        return children.map(function(span) {
            if (span._type !== 'span') return '';
            var text = esc(span.text || '');
            var marks = span.marks || [];
            marks.forEach(function(mark) {
                if (mark === 'strong') { text = '<strong>' + text + '</strong>'; }
                else if (mark === 'em') { text = '<em>' + text + '</em>'; }
                else if (mark === 'code') { text = '<code>' + text + '</code>'; }
                else if (mark === 'underline') { text = '<u>' + text + '</u>'; }
                else if (defsMap[mark] && defsMap[mark]._type === 'link') {
                    var href = esc(defsMap[mark].href || '#');
                    text = '<a href="' + href + '" rel="noopener noreferrer" target="_blank">' + text + '</a>';
                }
            });
            return text;
        }).join('');
    }

    function blockPlainText(block) {
        return (block.children || []).map(function(s) { return s.text || ''; }).join('');
    }

    function isTableRow(block) {
        if (!block || block._type !== 'block' || block.listItem) return false;
        var t = blockPlainText(block).trim();
        return t.charAt(0) === '|' && t.charAt(t.length - 1) === '|';
    }

    function isSeparatorRow(text) {
        return /^\|[\s\-|:]+\|$/.test(text.trim());
    }

    function parseTableCells(text) {
        return text.trim().replace(/^\||\|$/g, '').split('|').map(function(c) { return c.trim(); });
    }

    function renderPortableTextFull(blocks) {
        if (!blocks || !blocks.length) return '';
        var html = '';
        var i = 0;
        while (i < blocks.length) {
            var block = blocks[i];

            // Table detection — collect consecutive pipe-row blocks
            if (isTableRow(block)) {
                var rows = [];
                while (i < blocks.length && isTableRow(blocks[i])) {
                    rows.push(blockPlainText(blocks[i]).trim());
                    i++;
                }
                // Filter out separator rows, mark header
                var dataRows = rows.filter(function(r) { return !isSeparatorRow(r); });
                if (dataRows.length) {
                    html += '<div class="table-wrap"><table>';
                    dataRows.forEach(function(row, idx) {
                        var cells = parseTableCells(row);
                        var tag = idx === 0 ? 'th' : 'td';
                        html += '<tr>' + cells.map(function(c) {
                            // strip inner bold markdown (**text**) for display
                            var content = c.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                            return '<' + tag + '>' + content + '</' + tag + '>';
                        }).join('') + '</tr>';
                    });
                    html += '</table></div>';
                }
                continue;
            }

            if (block._type === 'block') {
                var style = block.style || 'normal';
                var inner = renderSpansWithMarkDefs(block.children || [], block.markDefs);

                if (block.listItem) {
                    var listType = block.listItem === 'bullet' ? 'ul' : 'ol';
                    var items = '';
                    while (i < blocks.length && blocks[i].listItem === block.listItem) {
                        items += '<li>' + renderSpansWithMarkDefs(blocks[i].children || [], blocks[i].markDefs) + '</li>';
                        i++;
                    }
                    html += '<' + listType + '>' + items + '</' + listType + '>';
                    continue;
                }

                if (style === 'h2') { html += '<h2>' + inner + '</h2>'; }
                else if (style === 'h3') { html += '<h3>' + inner + '</h3>'; }
                else if (style === 'blockquote') { html += '<blockquote>' + inner + '</blockquote>'; }
                else { if (inner.trim()) html += '<p>' + inner + '</p>'; }
            } else if (block._type === 'code') {
                var lang = block.language ? ' data-lang="' + esc(block.language) + '"' : '';
                html += '<pre' + lang + '><code>' + esc(block.code || '') + '</code></pre>';
            } else if (block._type === 'ragCacheAnalyzer') {
                var wh = block.heading ? esc(block.heading) : 'Interactive Cost Analyzer';
                html += '<div class="rag-cache-widget-placeholder" data-heading="' + wh + '" data-key="' + esc(block._key || '') + '"></div>';
            }
            i++;
        }
        return html;
    }

    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // ============================================
    // DATE FORMATTER
    // ============================================
    function formatDate(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    // ============================================
    // LISTING VIEW
    // ============================================
    function renderListing(posts) {
        var grid = document.getElementById('posts-grid');
        grid.innerHTML = '';

        if (!posts || posts.length === 0) {
            grid.innerHTML = '<div class="empty-state">No posts yet. Check back soon.</div>';
            return;
        }

        posts.forEach(function(post, idx) {
            var card = document.createElement('article');
            card.className = 'post-card glass-card animate-in stagger-' + Math.min(idx + 1, 5);
            card.setAttribute('tabindex', '0');
            card.setAttribute('role', 'link');
            card.setAttribute('aria-label', 'Read post: ' + post.title);

            var slug = post.slug && post.slug.current ? post.slug.current : '';
            var tagsHtml = '';
            if (post.tags && post.tags.length) {
                tagsHtml = '<div class="post-card-tags">' +
                    post.tags.map(function(t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('') +
                    '</div>';
            }

            card.innerHTML =
                '<div class="post-card-date">' + formatDate(post.publishedAt) + '</div>' +
                '<div class="post-card-title">' + esc(post.title || '') + '</div>' +
                (post.excerpt ? '<div class="post-card-excerpt">' + esc(post.excerpt) + '</div>' : '') +
                tagsHtml +
                '<span class="post-card-link">Read &#8594;</span>';

            function openPost() {
                window.history.pushState({}, '', '/blog?post=' + encodeURIComponent(slug));
                loadPost(slug);
            }

            card.addEventListener('click', openPost);
            card.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPost(); }
            });

            grid.appendChild(card);
        });

        // Trigger animations
        requestAnimationFrame(function() {
            initScrollAnimations();
        });
    }

    function showListingError(msg) {
        var grid = document.getElementById('posts-grid');
        grid.innerHTML = '<div class="error-state">' + esc(msg) + '</div>';
    }

    function loadListing() {
        var query = '*[_type == "post" && defined(slug.current)] | order(publishedAt desc) { title, slug, publishedAt, excerpt, tags }';
        sanityFetch(query)
            .then(renderListing)
            .catch(function(err) { showListingError(err.message); });
    }

    // ============================================
    // SINGLE POST VIEW
    // ============================================
    function showPostView() {
        document.getElementById('listing-view').style.display = 'none';
        document.getElementById('post-view').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function showListingView() {
        document.getElementById('listing-view').style.display = 'block';
        document.getElementById('post-view').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function renderPost(post) {
        if (!post) {
            document.getElementById('post-body').innerHTML =
                '<div class="error-state">Post not found.</div>';
            return;
        }

        document.title = post.title + ' — Aaron Hanuschak';
        document.getElementById('post-title').textContent = post.title || '';
        document.getElementById('post-date').textContent = formatDate(post.publishedAt);

        var tagsEl = document.getElementById('post-tags');
        tagsEl.innerHTML = '';
        if (post.tags && post.tags.length) {
            post.tags.forEach(function(t) {
                var span = document.createElement('span');
                span.className = 'tag';
                span.textContent = t;
                tagsEl.appendChild(span);
            });
        }

        document.getElementById('post-body').innerHTML = renderPortableTextFull(post.body || []);
        if (window.initRagCacheWidgets) window.initRagCacheWidgets();
    }

    function showPostError(msg) {
        document.getElementById('post-body').innerHTML =
            '<div class="error-state">' + esc(msg) + '</div>';
    }

    function loadPost(slug) {
        showPostView();
        document.getElementById('post-title').textContent = '';
        document.getElementById('post-date').textContent = '';
        document.getElementById('post-tags').innerHTML = '';
        document.getElementById('post-body').innerHTML =
            '<div class="glass-card skeleton-card" style="max-width:720px">' +
                '<div class="skeleton-line short"></div>' +
                '<div class="skeleton-line title" style="height:32px;width:75%"></div>' +
                '<div class="skeleton-line full"></div>' +
                '<div class="skeleton-line medium"></div>' +
                '<div class="skeleton-line full"></div>' +
            '</div>';

        var query = '*[_type == "post" && slug.current == $slug][0] { title, publishedAt, tags, body }';
        sanityFetch(query, { slug: slug })
            .then(renderPost)
            .catch(function(err) { showPostError(err.message); });
    }

    // ============================================
    // ROUTER — driven by ?post= URL param
    // ============================================
    function route() {
        var params = new URLSearchParams(window.location.search);
        var slug = params.get('post');
        if (slug) {
            loadPost(slug);
        } else {
            showListingView();
            loadListing();
        }
    }

    // Back button
    document.getElementById('post-back-btn').addEventListener('click', function() {
        window.history.pushState({}, '', '/blog');
        document.title = 'Blog — Aaron Hanuschak';
        showListingView();
        // Reload listing if grid is empty (direct navigation to post then back)
        var grid = document.getElementById('posts-grid');
        if (!grid.querySelector('.post-card')) {
            loadListing();
        }
    });

    // Browser back/forward
    window.addEventListener('popstate', route);

    // ============================================
    // NAVIGATION — scroll effects + mobile toggle
    // ============================================
    (function navigation() {
        var nav = document.querySelector('.nav');
        var toggle = document.querySelector('.nav-toggle');
        var links = document.querySelector('.nav-links');
        var navAnchors = document.querySelectorAll('.nav-links a');

        window.addEventListener('scroll', function() {
            nav.classList.toggle('scrolled', window.scrollY > 50);
        });

        toggle.addEventListener('click', function() {
            var isOpen = links.classList.toggle('open');
            toggle.setAttribute('aria-expanded', isOpen);
        });

        navAnchors.forEach(function(a) {
            a.addEventListener('click', function() {
                links.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
            });
        });
    })();

    // ============================================
    // SCROLL PROGRESS BAR
    // ============================================
    (function scrollProgress() {
        var bar = document.querySelector('.scroll-progress');
        window.addEventListener('scroll', function() {
            var scrollTop = window.scrollY;
            var docHeight = document.documentElement.scrollHeight - window.innerHeight;
            bar.style.width = docHeight > 0 ? (scrollTop / docHeight * 100) + '%' : '0';
        });
    })();

    // ============================================
    // SCROLL ANIMATIONS — IntersectionObserver
    // ============================================
    function initScrollAnimations() {
        var elements = document.querySelectorAll('.animate-in:not(.visible)');
        if (!elements.length) return;
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        elements.forEach(function(el) { observer.observe(el); });
    }

    // ============================================
    // INIT
    // ============================================
    route();
    initScrollAnimations();
    </script>
    <script src="/blog/rag-cache-analyzer.js"></script>
</body>
